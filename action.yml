# Overreach — GitHub Action (composite). Marketplace-ready.
#
# One-click onboarding: drops the overreach.yml workflow into the consumer's
# repo and runs `overreach init` to write .overreach/ (prompt.md, config,
# ledger), install the pre-commit hook, and append scope-audit instructions to
# CLAUDE.md, .cursorrules, and codex.md. After this runs once, every PR is
# audited with zero config and zero API key.
#
# Usage (in a temporary workflow in the consumer repo, run once, then delete):
#   name: install-overreach
#   on: workflow_dispatch
#   jobs:
#     install:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#         - uses: Naveja00/Overreach@v1
#           with:
#             fail-on: HIGH
#
# What it writes:
#   .github/workflows/overreach.yml  — the PR gate (zero-key by default)
#   .overreach/prompt.md             — fill in with your authorized prompt
#   .overreach/config.json           — cross-vendor coordination config
#   .git/hooks/pre-commit            — local commit-time audit (blocks on HIGH)
#   CLAUDE.md / .cursorrules / codex.md — agent self-audit instructions
#
# This action is a one-shot installer. It does NOT run the audit itself — the
# dropped .github/workflows/overreach.yml does that on every PR.
name: "Install Overreach"
description: "Drop the Overreach scope-creep gate + .overreach/ coordination format into a repo. Zero-config, no API key required."
author: "Naveja00"
branding:
  icon: "shield"
  color: "red"

inputs:
  fail-on:
    description: "Comma-separated scores that fail the PR check (HIGH, MEDIUM, LOW). Default: HIGH."
    required: false
    default: "HIGH"
  require-claims:
    description: "Opt-in coordination enforcement. 'true' fails the PR if the diff touches a file with an open (unresolved) conflict; 'strict' also fails on files no agent actively claimed. Default: false (off — existing gates unaffected)."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Run overreach init
      shell: bash
      run: |
        npx -y overreach@latest init

    - name: Drop the overreach.yml workflow
      shell: bash
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        REQUIRE_CLAIMS: ${{ inputs.require-claims }}
      run: |
        mkdir -p .github/workflows
        # Only write if absent — never clobber a customized gate.
        if [ -f .github/workflows/overreach.yml ]; then
          echo "::notice::.github/workflows/overreach.yml already exists — left untouched."
        else
          cat > .github/workflows/overreach.yml <<'WORKFLOW_EOF'
        # Overreach — PR scope-creep gate. Zero-config. No API key required.
        # Generated by the Install Overreach action. See docs/ci-gate.md.
        name: overreach-scope-audit
        on:
          pull_request:
            types: [opened, synchronize, reopened, edited]
          push:
            branches: [main, master]
        permissions:
          contents: read
          pull-requests: write
        concurrency:
          group: overreach-${{ github.event.pull_request.number || github.sha }}
          cancel-in-progress: true
        jobs:
          audit:
            name: Overreach scope-creep audit
            runs-on: ubuntu-latest
            env:
              FAIL_ON: __FAIL_ON_VALUE__
              REQUIRE_CLAIMS: __REQUIRE_CLAIMS_VALUE__
            steps:
              - uses: actions/checkout@v4
                with:
                  fetch-depth: 0
              - name: Resolve authorized prompt
                id: prompt
                env:
                  PR_TITLE: ${{ github.event.pull_request.title || '' }}
                  PR_BODY: ${{ github.event.pull_request.body || '' }}
                run: |
                  if [ -f .overreach/prompt.md ] && [ -s .overreach/prompt.md ]; then
                    cp .overreach/prompt.md "$RUNNER_TEMP/prompt.txt"
                    echo "source=.overreach/prompt.md" >> "$GITHUB_OUTPUT"
                  elif [ -n "$PR_TITLE" ]; then
                    printf '%s\n\n%s\n' "$PR_TITLE" "$PR_BODY" > "$RUNNER_TEMP/prompt.txt"
                    echo "source=PR title + body" >> "$GITHUB_OUTPUT"
                  elif [ -f AGENTS.md ] && [ -s AGENTS.md ]; then
                    cp AGENTS.md "$RUNNER_TEMP/prompt.txt"
                    echo "source=AGENTS.md" >> "$GITHUB_OUTPUT"
                  else
                    printf '%s\n\n%s\n' "$PR_TITLE" "$PR_BODY" > "$RUNNER_TEMP/prompt.txt"
                    echo "source=PR title + body (fallback)" >> "$GITHUB_OUTPUT"
                  fi
              - name: Build diff
                id: diff
                env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                run: |
                  if [ -n "$PR_NUMBER" ]; then
                    gh pr diff "$PR_NUMBER" > "$RUNNER_TEMP/pr.diff"
                  else
                    git diff HEAD~1 HEAD > "$RUNNER_TEMP/pr.diff" 2>/dev/null || git show HEAD > "$RUNNER_TEMP/pr.diff"
                  fi
                  lines=$(wc -l < "$RUNNER_TEMP/pr.diff")
                  if [ "$lines" -eq 0 ]; then echo "empty=true" >> "$GITHUB_OUTPUT"; fi
              - name: Run Overreach (no-key deterministic by default)
                id: overreach
                if: steps.diff.outputs.empty != 'true'
                env:
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
                run: |
                  set +e
                  npx -y overreach@latest \
                    --prompt "$(cat "$RUNNER_TEMP/prompt.txt")" --diff "$RUNNER_TEMP/pr.diff" \
                    > "$RUNNER_TEMP/cli.out" 2> "$RUNNER_TEMP/run.log"
                  [ -s "$RUNNER_TEMP/run.log" ] && cat "$RUNNER_TEMP/run.log" || true
                  score=$(grep -oE 'scope_creep_score = [A-Z]+' "$RUNNER_TEMP/cli.out" | head -1 | awk '{print $NF}')
                  echo "score=$score" >> "$GITHUB_OUTPUT"
                  exit 0
              - name: Build PR comment
                if: always() && steps.diff.outputs.empty != 'true'
                env:
                  PROMPT_SOURCE: ${{ steps.prompt.outputs.source }}
                run: |
                  {
                    echo "## 🔍 Overreach — scope-creep audit"
                    echo
                    echo "_Prompt source: $PROMPT_SOURCE · score: \`${{ steps.overreach.outputs.score }}\`_"
                    echo
                    if [ -s "$RUNNER_TEMP/cli.out" ]; then echo '```'; cat "$RUNNER_TEMP/cli.out"; echo '```'; fi
                    echo
                    echo "_Deterministic \`actual − authorized\` set arithmetic. [Overreach](https://github.com/Naveja00/OverReach)_"
                  } > "$RUNNER_TEMP/comment.md"
              - name: Post PR comment
                if: always() && github.event_name == 'pull_request' && steps.diff.outputs.empty != 'true'
                env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                run: |
                  gh pr comment "$PR_NUMBER" --edit-last --body-file "$RUNNER_TEMP/comment.md" 2>/dev/null \
                    || gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/comment.md"
              - name: Gate — fail on threshold breach
                if: steps.overreach.outputs.score != ''
                env:
                  SCORE: ${{ steps.overreach.outputs.score }}
                  FAIL_ON: ${{ env.FAIL_ON }}
                run: |
                  score_lower=$(echo "$SCORE" | tr 'A-Z' 'a-z')
                  fail_lower=$(echo "$FAIL_ON" | tr 'A-Z' 'a-z')
                  hit=0; IFS=','
                  for level in $fail_lower; do [ "$level" = "$score_lower" ] && hit=1; done
                  unset IFS
                  if [ "$hit" -eq 1 ]; then
                    echo "::error::Overreach flagged scope_creep_score=$SCORE — diff adds unauthorized things. See PR comment."
                    exit 1
                  fi
              - name: Coordination gate (opt-in)
                if: env.REQUIRE_CLAIMS != '' && env.REQUIRE_CLAIMS != 'false' && steps.diff.outputs.empty != 'true'
                env:
                  REQUIRE_CLAIMS: ${{ env.REQUIRE_CLAIMS }}
                run: |
                  strict_flag=""
                  [ "$REQUIRE_CLAIMS" = "strict" ] && strict_flag="--strict"
                  # The coordination gate runs against the same PR diff + the
                  # committed .overreach/ state. Fails (exit 1) if the diff
                  # touches a file with an open conflict, or in strict mode an
                  # unclaimed file. Off unless the repo set require-claims.
                  set +e
                  npx -y overreach@latest coord-check \
                    --diff "$RUNNER_TEMP/pr.diff" $strict_flag \
                    > "$RUNNER_TEMP/coord.out" 2> "$RUNNER_TEMP/coord.log"
                  rc=$?
                  [ -s "$RUNNER_TEMP/coord.log" ] && cat "$RUNNER_TEMP/coord.log" || true
                  if [ -s "$RUNNER_TEMP/coord.out" ]; then
                    {
                      echo "## 🤝 Overreach — coordination check"
                      echo
                      echo '```'
                      cat "$RUNNER_TEMP/coord.out"
                      echo '```'
                    } >> "$RUNNER_TEMP/comment.md"
                  fi
                  if [ "$rc" -ne 0 ]; then
                    echo "::error::Overreach coordination gate blocked this PR (open conflict or unclaimed file). See PR comment."
                    exit 1
                  fi
        WORKFLOW_EOF
          # Bake the chosen fail-on + require-claims values into the dropped
          # workflow (the heredoc is single-quoted so GitHub ${{ }} expressions
          # stay literal; __*__ are plain placeholders safe to sed-replace).
          sed -i "s/__FAIL_ON_VALUE__/${FAIL_ON}/" .github/workflows/overreach.yml
          sed -i "s/__REQUIRE_CLAIMS_VALUE__/${REQUIRE_CLAIMS}/" .github/workflows/overreach.yml
          echo "::notice::Wrote .github/workflows/overreach.yml (fail-on: ${FAIL_ON}, require-claims: ${REQUIRE_CLAIMS})."
        fi

    - name: Print next steps
      shell: bash
      run: |
        echo ""
        echo "::group::Overreach installed"
        echo "✓ .overreach/ coordination format written (prompt.md, config.json, ledger)"
        echo "✓ pre-commit hook installed (blocks local commits on HIGH)"
        echo "✓ CLAUDE.md / .cursorrules / codex.md updated with self-audit instructions"
        echo "✓ .github/workflows/overreach.yml dropped — every PR is now audited"
        echo ""
        echo "Next steps:"
        echo "  1. Edit .overreach/prompt.md with your authorized task prompt"
        echo "  2. Commit + push — the gate runs on your next PR with NO API key"
        echo "  3. (Optional) set ANTHROPIC_API_KEY / OPENAI_API_KEY / OLLAMA_API_KEY"
        echo "     as a repo secret for LLM-grade scope extraction"
        echo "::endgroup::"